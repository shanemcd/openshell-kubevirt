# In-cluster kubectl proxy so Hermes (OpenShell sandbox) can reach the kube API.
# OpenShell SSRF blocks egress to :6443, so direct apiserver access from the sandbox fails.
# The proxy uses SA hermes-admin (cluster-admin) and listens on :8080.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hermes-admin
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hermes-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: hermes-admin
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-kube-proxy
  namespace: default
  labels:
    app: hermes-kube-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-kube-proxy
  template:
    metadata:
      labels:
        app: hermes-kube-proxy
    spec:
      serviceAccountName: hermes-admin
      containers:
      - name: proxy
        image: registry.k8s.io/kubectl:v1.31.0
        args:
        - proxy
        - --address=0.0.0.0
        - --port=8080
        - --accept-hosts=.*
        - --disable-filter=true
        ports:
        - name: http
          containerPort: 8080
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-kube-proxy
  namespace: default
spec:
  selector:
    app: hermes-kube-proxy
  ports:
  - name: http
    port: 8080
    targetPort: 8080
