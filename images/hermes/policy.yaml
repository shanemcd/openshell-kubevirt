version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    # Keep defaults from the gateway-built initial policy (cannot shrink live).
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
    # Hermes / NemoClaw on the bootc guest (blueprint path is NemoClaw-only)
    - /opt/hermes
    - /opt/nemoclaw-blueprint
    - /usr/local
    - /lib64
    - /bin
    - /sbin
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
    - /opt/data
    - /dev/pts
    - /run

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  # OpenShell inference proxy (Vertex). Hermes dials this host; gateway rewrites.
  inference:
    name: inference
    endpoints:
      - host: inference.local
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/python3.13

  # Auxiliary model / credit probe fallback
  openrouter:
    name: openrouter
    endpoints:
      - host: openrouter.ai
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/python3.13

  duckduckgo:
    name: duckduckgo
    endpoints:
      - host: duckduckgo.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: "*.duckduckgo.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/python3.13
      - path: /usr/bin/curl

  # Live stock quotes / charts (Hermes web_search fallbacks often hit Yahoo).
  yahoo_finance:
    name: yahoo-finance
    endpoints:
      - host: finance.yahoo.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: query1.finance.yahoo.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: query2.finance.yahoo.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: "*.yahoo.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/python3.13
      - path: /usr/bin/curl

  github:
    name: github
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      # Provider overlay is GraphQL read-only + gh/git only; Hermes (python)
      # needs an explicit full GraphQL route on the base policy.
      - host: api.github.com
        path: /graphql
        port: 443
        protocol: graphql
        enforcement: enforce
        access: full
      - host: github.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: codeload.github.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      # Release / raw / package CDNs (gh + other GitHub release installs)
      - host: "*.githubusercontent.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      # Downloaders (Landlock: install into /sandbox/... — /usr/local is read-only)
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/python3.13
      - path: /usr/bin/curl
      - path: /usr/bin/wget
      # Post-install binary locations
      - path: /sandbox/.hermes/bin/gh
      - path: /sandbox/**/bin/gh
      - path: /usr/local/bin/gh
      - path: /usr/bin/gh

  # uv installer
  astral:
    name: astral
    endpoints:
      - host: astral.sh
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: "*.astral.sh"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/bin/curl
      - path: /usr/bin/wget
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/python3.13

  pypi:
    name: pypi
    endpoints:
      - host: pypi.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: files.pythonhosted.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/python3.13
      - path: /usr/bin/pip
      - path: /usr/bin/pip3

  # tirith / package ecosystem metadata
  package_metadata:
    name: package-metadata
    endpoints:
      - host: api.deps.dev
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: packages.ecosyste.ms
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /sandbox/.hermes/bin/tirith
      - path: /sandbox/**/bin/tirith
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/python3.13

  slack:
    name: slack
    endpoints:
      - host: "*.slack.com"
        port: 443
        protocol: websocket
        enforcement: enforce
        access: full
        websocket_credential_rewrite: true
      - host: slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: files.slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/python3.13

  signal:
    name: signal
    endpoints:
      - host: signal-cli.default.svc.cluster.local
        port: 8080
        protocol: rest
        enforcement: enforce
        access: full
        # ClusterIP is RFC1918; without allowed_ips the proxy L7-allows then
        # SSRF-denies ("resolves to internal address"). CRC serviceNetwork.
        allowed_ips:
          - 10.217.4.0/23
    binaries:
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/python3.13
      - path: /usr/bin/curl

  # jirahhh / Atlassian REST (Basic auth rewritten by --provider atlassian)
  atlassian_jira:
    name: atlassian-jira
    endpoints:
      - host: redhat.atlassian.net
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: "*.atlassian.net"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/python3.13
      - path: /opt/hermes/.venv/bin/jirahhh
      - path: /sandbox/**/bin/jirahhh
      - path: /usr/bin/curl

  atlassian_mcp:
    name: atlassian-mcp
    endpoints:
      - host: mcp.atlassian.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: id.atlassian.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/python3.13
      - path: /usr/bin/curl

  # Google Workspace CLI (gws) — discovery hits www.googleapis.com first
  google_workspace:
    name: google-workspace
    endpoints:
      - host: gmail.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: calendar-json.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: www.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: oauth2.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
        request_body_credential_rewrite: true
      - host: accounts.google.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/bin/python3.13
      - path: /usr/local/lib/node_modules/@googleworkspace/cli/bin/gws
      - path: /usr/lib/node_modules/@googleworkspace/cli/bin/gws
      - path: /usr/local/bin/gws
      - path: /usr/bin/gws
      - path: /usr/bin/curl

  # rustup installer (mktemp drops rustup-init under /tmp/tmp.*)
  rustup:
    name: rustup
    endpoints:
      - host: sh.rustup.rs
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: static.rust-lang.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/bin/curl
      - path: /usr/bin/wget
      - path: /tmp/rustup-init
      - path: /tmp/**/rustup-init
      - path: /sandbox/**/rustup-init
      - path: /usr/local/rustup/toolchains/**/bin/cargo
      - path: /usr/local/cargo/bin/cargo
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/python3.13

  # Common CLI bootstrap hosts (Hermes terminal installs)
  go_download:
    name: go-download
    endpoints:
      - host: go.dev
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: golang.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: proxy.golang.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: sum.golang.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: gopkg.in
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: "*.gopkg.in"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: sigs.k8s.io
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: dl.k8s.io
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: registry.k8s.io
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: "*.s3.dualstack.us-east-1.amazonaws.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: us-east4-docker.pkg.dev
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: quay.io
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: "*.quay.io"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: go.yaml.in
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: al.essio.dev
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/bin/curl
      - path: /usr/bin/wget
      - path: /sandbox/.local/go/bin/go
      - path: /sandbox/**/go/bin/go
      - path: /usr/local/go/bin/go
      - path: /usr/bin/go

  helm_download:
    name: helm-download
    endpoints:
      - host: get.helm.sh
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/bin/curl
      - path: /usr/bin/wget

  google_dl:
    name: google-dl
    endpoints:
      - host: dl.google.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/bin/curl
      - path: /usr/bin/wget

  # npm registry (node CLIs under /usr/bin/node-*)
  npm_registry:
    name: npm-registry
    endpoints:
      - host: registry.npmjs.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/bin/node
      - path: /usr/bin/node-22
      - path: /usr/bin/npm
      - path: /usr/bin/npx
      - path: /usr/bin/curl

  # cargo crate index / downloads
  crates_io:
    name: crates-io
    endpoints:
      - host: index.crates.io
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: static.crates.io
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: crates.io
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/local/rustup/toolchains/**/bin/cargo
      - path: /usr/local/cargo/bin/cargo
      - path: /sandbox/**/bin/cargo
      - path: /usr/bin/cargo
      - path: /usr/bin/curl

  # podman pulls from Docker Hub
  docker_hub:
    name: docker-hub
    endpoints:
      - host: registry-1.docker.io
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: auth.docker.io
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: production.cloudfront.docker.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: docker.io
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/bin/podman
      - path: /usr/bin/docker
      - path: /usr/bin/curl

  # apt inside Debian/podman containers — pasta is the host-side dialer
  debian_apt:
    name: debian-apt
    endpoints:
      - host: deb.debian.org
        port: 80
        protocol: rest
        enforcement: enforce
        access: full
      - host: deb.debian.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: security.debian.org
        port: 80
        protocol: rest
        enforcement: enforce
        access: full
      - host: security.debian.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/bin/pasta.avx2
      - path: /usr/bin/pasta
      - path: /usr/lib/apt/methods/http
      - path: /usr/lib/apt/methods/https
      - path: /usr/bin/curl
      - path: /usr/bin/apt-get
      - path: /usr/bin/apt
      - path: /usr/bin/podman
