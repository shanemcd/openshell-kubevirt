version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    # Keep defaults from the gateway-built initial policy (cannot shrink live).
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
    # Hermes / NemoClaw on the bootc guest
    - /opt/hermes
    - /opt/nemoclaw-blueprint
    - /usr/local
    - /lib64
    - /bin
    - /sbin
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
    - /opt/data
    - /dev/pts
    - /run

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  duckduckgo:
    name: duckduckgo
    endpoints:
      - host: duckduckgo.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: "*.duckduckgo.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /opt/hermes/.venv/bin/python

  github:
    name: github
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: github.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/curl
      - path: /usr/local/bin/gh

  slack:
    name: slack
    endpoints:
      - host: "*.slack.com"
        port: 443
        protocol: websocket
        enforcement: enforce
        access: full
        websocket_credential_rewrite: true
      - host: slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: files.slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /opt/hermes/.venv/bin/python
