name: Nightly rebase and rebuild

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC
  workflow_dispatch:
    inputs:
      rebase:
        description: Rebase forks onto upstream and force-push when clean
        type: boolean
        default: true
      push_images:
        description: Build and push images to GHCR
        type: boolean
        default: true
      build_container_disk:
        description: Convert hermes-sandbox-bootc + hermes-minimal-bootc to containerDisk images
        type: boolean
        default: true
      build_hermes:
        description: Rebuild hermes-sandbox-bootc (nemoclaw variant; uses GHCR supervisor + nemoclaw-hermes)
        type: boolean
        default: false
      build_hermes_minimal:
        description: Rebuild hermes-minimal-bootc (no NemoClaw; uses GHCR supervisor)
        type: boolean
        default: false
      build_site_hermes:
        description: Layer toolbox openshell-kubevirt/ onto hermes-minimal bootc → hermes-site-bootc + hermes-site-kubevirt
        type: boolean
        default: true

concurrency:
  group: nightly-rebuild
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      date: ${{ steps.meta.outputs.date }}
      rebase: ${{ steps.meta.outputs.rebase }}
      push_images: ${{ steps.meta.outputs.push_images }}
      build_container_disk: ${{ steps.meta.outputs.build_container_disk }}
      build_hermes: ${{ steps.meta.outputs.build_hermes }}
      build_hermes_minimal: ${{ steps.meta.outputs.build_hermes_minimal }}
      build_site_hermes: ${{ steps.meta.outputs.build_site_hermes }}
    steps:
      - id: meta
        run: |
          set -euo pipefail
          echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "rebase=${{ inputs.rebase }}" >> "$GITHUB_OUTPUT"
            echo "push_images=${{ inputs.push_images }}" >> "$GITHUB_OUTPUT"
            echo "build_container_disk=${{ inputs.build_container_disk }}" >> "$GITHUB_OUTPUT"
            echo "build_hermes=${{ inputs.build_hermes }}" >> "$GITHUB_OUTPUT"
            echo "build_hermes_minimal=${{ inputs.build_hermes_minimal }}" >> "$GITHUB_OUTPUT"
            echo "build_site_hermes=${{ inputs.build_site_hermes }}" >> "$GITHUB_OUTPUT"
          else
            echo "rebase=true" >> "$GITHUB_OUTPUT"
            echo "push_images=true" >> "$GITHUB_OUTPUT"
            echo "build_container_disk=true" >> "$GITHUB_OUTPUT"
            echo "build_hermes=false" >> "$GITHUB_OUTPUT"
            echo "build_hermes_minimal=false" >> "$GITHUB_OUTPUT"
            echo "build_site_hermes=true" >> "$GITHUB_OUTPUT"
          fi

  rebase-agent-sandbox:
    needs: meta
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      sha: ${{ steps.rebase.outputs.sha }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: agent-sandbox

      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/agent-sandbox
          ref: kubevirt-backend
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          path: src

      - id: rebase
        working-directory: src
        env:
          SHOULD_REBASE: ${{ needs.meta.outputs.rebase }}
        run: |
          set -euo pipefail
          git config user.name "openshell-kubevirt-rebase[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/kubernetes-sigs/agent-sandbox.git
          git fetch upstream main
          if [[ "$SHOULD_REBASE" == "true" ]]; then
            if ! git rebase upstream/main; then
              echo "::error::Rebase conflict on agent-sandbox kubevirt-backend"
              git status
              git rebase --abort || true
              exit 1
            fi
            if ! git push --force-with-lease origin kubevirt-backend 2>push.err; then
              cat push.err >&2
              if grep -qiE 'workflows permission|without .workflows. permission' push.err; then
                echo "::error::GitHub App cannot push .github/workflows changes. Grant the App Workflows: Read and write, accept it on installed repos, then re-run."
              fi
              exit 1
            fi
          else
            echo "Skipping rebase/push (rebase=false)"
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

  rebase-openshell:
    needs: meta
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      sha: ${{ steps.rebase.outputs.sha }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: OpenShell

      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/OpenShell
          ref: vm-runtime-backend
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          path: src

      - id: rebase
        working-directory: src
        env:
          SHOULD_REBASE: ${{ needs.meta.outputs.rebase }}
        run: |
          set -euo pipefail
          git config user.name "openshell-kubevirt-rebase[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/NVIDIA/OpenShell.git
          git fetch upstream main
          if [[ "$SHOULD_REBASE" == "true" ]]; then
            if ! git rebase upstream/main; then
              echo "::error::Rebase conflict on OpenShell vm-runtime-backend"
              git status
              git rebase --abort || true
              exit 1
            fi
            if ! git push --force-with-lease origin vm-runtime-backend 2>push.err; then
              cat push.err >&2
              if grep -qiE 'workflows permission|without .workflows. permission' push.err; then
                echo "::error::GitHub App cannot push .github/workflows changes. Grant the App Workflows: Read and write, accept it on installed repos, then re-run."
              fi
              exit 1
            fi
          else
            echo "Skipping rebase/push (rebase=false)"
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  rebase-nemoclaw:
    needs: meta
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      sha: ${{ steps.rebase.outputs.sha }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: NemoClaw

      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/NemoClaw
          ref: vm-runtime-backend
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          path: src

      - id: rebase
        working-directory: src
        env:
          SHOULD_REBASE: ${{ needs.meta.outputs.rebase }}
        run: |
          set -euo pipefail
          git config user.name "openshell-kubevirt-rebase[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/NVIDIA/NemoClaw.git
          git fetch upstream main
          if [[ "$SHOULD_REBASE" == "true" ]]; then
            if ! git rebase upstream/main; then
              echo "::error::Rebase conflict on NemoClaw vm-runtime-backend"
              git status
              git rebase --abort || true
              exit 1
            fi
            if ! git push --force-with-lease origin vm-runtime-backend 2>push.err; then
              cat push.err >&2
              if grep -qiE 'workflows permission|without .workflows. permission' push.err; then
                echo "::error::GitHub App cannot push .github/workflows changes. Grant the App Workflows: Read and write, accept it on installed repos, then re-run."
              fi
              exit 1
            fi
          else
            echo "Skipping rebase/push (rebase=false)"
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # Gate: do not start image builds until every fork rebase/push succeeded.
  rebases:
    needs: [rebase-agent-sandbox, rebase-openshell, rebase-nemoclaw]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Require all rebases succeeded
        env:
          AGENT: ${{ needs.rebase-agent-sandbox.result }}
          OPENSHELL: ${{ needs.rebase-openshell.result }}
          NEMOCLAW: ${{ needs.rebase-nemoclaw.result }}
        run: |
          set -euo pipefail
          echo "agent-sandbox=${AGENT} openshell=${OPENSHELL} nemoclaw=${NEMOCLAW}"
          if [[ "$AGENT" != success || "$OPENSHELL" != success || "$NEMOCLAW" != success ]]; then
            echo "::error::One or more fork rebases failed; skipping image builds."
            exit 1
          fi

  build-agent-sandbox:
    needs: [meta, rebases, rebase-agent-sandbox]
    if: needs.meta.outputs.push_images == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/agent-sandbox
          ref: ${{ needs.rebase-agent-sandbox.outputs.sha }}
          path: src

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push controller
        working-directory: src
        env:
          DATE: ${{ needs.meta.outputs.date }}
          SHA: ${{ needs.rebase-agent-sandbox.outputs.sha }}
        run: |
          set -euo pipefail
          SHORT="${SHA:0:7}"
          IMAGE="${REGISTRY}/agent-sandbox-controller"
          GIT_VERSION=$(git describe --always --dirty 2>/dev/null || echo "$SHORT")
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          docker buildx build \
            --platform=linux/amd64 \
            --push \
            -t "${IMAGE}:nightly" \
            -t "${IMAGE}:${DATE}" \
            -t "${IMAGE}:sha-${SHORT}" \
            --build-arg "GIT_VERSION=${GIT_VERSION}" \
            --build-arg "GIT_SHA=${SHORT}" \
            --build-arg "BUILD_DATE=${BUILD_DATE}" \
            -f Dockerfile \
            .

  build-openshell-gateway:
    needs: [meta, rebases, rebase-openshell]
    if: needs.meta.outputs.push_images == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/OpenShell
          ref: ${{ needs.rebase-openshell.outputs.sha }}
          path: src
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: jdx/mise-action@v2
        with:
          working_directory: src

      - name: Stage gateway binary and push image
        working-directory: src
        env:
          DATE: ${{ needs.meta.outputs.date }}
          SHA: ${{ needs.rebase-openshell.outputs.sha }}
          DOCKER_PLATFORM: linux/amd64
          MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SHORT="${SHA:0:7}"
          TAG="sha-${SHORT}"
          mise install --locked
          DOCKER_PLATFORM=linux/amd64 tasks/scripts/stage-prebuilt-binaries.sh gateway
          # Script maps IMAGE_REGISTRY + openshell/gateway → ${REGISTRY}/gateway
          IMAGE_REGISTRY="${REGISTRY}" \
          IMAGE_TAG="${TAG}" \
          DOCKER_PLATFORM=linux/amd64 \
          DOCKER_PUSH=1 \
          CI=1 \
            tasks/scripts/docker-build-image.sh gateway
          SRC="${REGISTRY}/gateway:${TAG}"
          for t in nightly "${DATE}" "${TAG}"; do
            docker buildx imagetools create \
              -t "${REGISTRY}/openshell-gateway:${t}" \
              "$SRC"
          done

  build-openshell-supervisor:
    needs: [meta, rebases, rebase-openshell]
    if: needs.meta.outputs.push_images == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/OpenShell
          ref: ${{ needs.rebase-openshell.outputs.sha }}
          path: src
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: jdx/mise-action@v2
        with:
          working_directory: src

      - name: Stage supervisor binary and push image
        working-directory: src
        env:
          DATE: ${{ needs.meta.outputs.date }}
          SHA: ${{ needs.rebase-openshell.outputs.sha }}
          DOCKER_PLATFORM: linux/amd64
          MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SHORT="${SHA:0:7}"
          TAG="sha-${SHORT}"
          mise install --locked
          DOCKER_PLATFORM=linux/amd64 tasks/scripts/stage-prebuilt-binaries.sh supervisor
          IMAGE_REGISTRY="${REGISTRY}" \
          IMAGE_TAG="${TAG}" \
          DOCKER_PLATFORM=linux/amd64 \
          DOCKER_PUSH=1 \
          CI=1 \
            tasks/scripts/docker-build-image.sh supervisor
          SRC="${REGISTRY}/supervisor:${TAG}"
          for t in nightly "${DATE}" "${TAG}" kubevirt; do
            docker buildx imagetools create \
              -t "${REGISTRY}/openshell-supervisor:${t}" \
              "$SRC"
          done

  build-nemoclaw-hermes:
    needs: [meta, rebases, rebase-nemoclaw]
    if: needs.meta.outputs.push_images == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/NemoClaw
          ref: ${{ needs.rebase-nemoclaw.outputs.sha }}
          path: src

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push nemoclaw-hermes
        working-directory: src
        env:
          DATE: ${{ needs.meta.outputs.date }}
          SHA: ${{ needs.rebase-nemoclaw.outputs.sha }}
        run: |
          set -euo pipefail
          SHORT="${SHA:0:7}"
          IMAGE="${REGISTRY}/nemoclaw-hermes"
          docker buildx build \
            --platform=linux/amd64 \
            --push \
            --build-arg BASE_IMAGE=ghcr.io/nvidia/nemoclaw/hermes-sandbox-base:latest \
            -t "${IMAGE}:nightly" \
            -t "${IMAGE}:${DATE}" \
            -t "${IMAGE}:sha-${SHORT}" \
            -t "${IMAGE}:kubevirt" \
            -f agents/hermes/Dockerfile \
            .

  build-hermes-bootc:
    needs: [meta, rebases, build-openshell-supervisor, build-nemoclaw-hermes]
    # NemoClaw variant → hermes-sandbox-bootc (public nemoclaw guest).
    if: |
      always() &&
      !cancelled() &&
      needs.meta.result == 'success' &&
      needs.rebases.result == 'success' &&
      (
        needs.meta.outputs.build_hermes == 'true' ||
        needs.meta.outputs.push_images == 'true' &&
        needs.build-openshell-supervisor.result == 'success' &&
        needs.build-nemoclaw-hermes.result == 'success' ||
        needs.meta.outputs.push_images != 'true' &&
        needs.meta.outputs.build_hermes != 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Use existing hermes-sandbox-bootc:nightly
        if: needs.meta.outputs.push_images != 'true' && needs.meta.outputs.build_hermes != 'true'
        run: echo "Skipping nemoclaw bootc rebuild; containerDisk will pull existing :nightly"

      - uses: actions/checkout@v4
        if: needs.meta.outputs.push_images == 'true' || needs.meta.outputs.build_hermes == 'true'

      - uses: docker/setup-buildx-action@v3
        if: needs.meta.outputs.push_images == 'true' || needs.meta.outputs.build_hermes == 'true'

      - uses: docker/login-action@v3
        if: needs.meta.outputs.push_images == 'true' || needs.meta.outputs.build_hermes == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare context and build hermes-sandbox-bootc (nemoclaw)
        if: needs.meta.outputs.push_images == 'true' || needs.meta.outputs.build_hermes == 'true'
        env:
          DATE: ${{ needs.meta.outputs.date }}
        run: |
          set -euo pipefail
          SHORT=$(git rev-parse --short HEAD)
          CTX=images/hermes
          cd "$CTX"

          # Gitignored locally; CI uses the example + empty CA bundle.
          cp -f hermes.env.example hermes.env
          : > extra-ca-certs.pem

          # Containerfile hardcodes localhost for nemoclaw; rewrite for GHCR/buildx.
          sed -i "s|FROM localhost/nemoclaw-hermes:kubevirt|FROM ${REGISTRY}/nemoclaw-hermes:nightly|" \
            Containerfile.nemoclaw

          IMAGE="${REGISTRY}/hermes-sandbox-bootc"
          docker buildx build \
            --platform=linux/amd64 \
            --push \
            --build-arg "OPENSHELL_SUPERVISOR_IMAGE=${REGISTRY}/openshell-supervisor:nightly" \
            -t "${IMAGE}:nightly" \
            -t "${IMAGE}:${DATE}" \
            -t "${IMAGE}:sha-${SHORT}" \
            -f Containerfile.nemoclaw \
            .

  build-hermes-minimal-bootc:
    needs: [meta, rebases, build-openshell-supervisor]
    # Hermes-minimal variant → hermes-minimal-bootc (no NemoClaw).
    if: |
      always() &&
      !cancelled() &&
      needs.meta.result == 'success' &&
      needs.rebases.result == 'success' &&
      (
        needs.meta.outputs.build_hermes_minimal == 'true' ||
        needs.meta.outputs.push_images == 'true' &&
        needs.build-openshell-supervisor.result == 'success' ||
        needs.meta.outputs.push_images != 'true' &&
        needs.meta.outputs.build_hermes_minimal != 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Use existing hermes-minimal-bootc:nightly
        if: needs.meta.outputs.push_images != 'true' && needs.meta.outputs.build_hermes_minimal != 'true'
        run: echo "Skipping minimal bootc rebuild; containerDisk will pull existing :nightly"

      - uses: actions/checkout@v4
        if: needs.meta.outputs.push_images == 'true' || needs.meta.outputs.build_hermes_minimal == 'true'

      - uses: docker/setup-buildx-action@v3
        if: needs.meta.outputs.push_images == 'true' || needs.meta.outputs.build_hermes_minimal == 'true'

      - uses: docker/login-action@v3
        if: needs.meta.outputs.push_images == 'true' || needs.meta.outputs.build_hermes_minimal == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare context and build hermes-minimal-bootc
        if: needs.meta.outputs.push_images == 'true' || needs.meta.outputs.build_hermes_minimal == 'true'
        env:
          DATE: ${{ needs.meta.outputs.date }}
        run: |
          set -euo pipefail
          SHORT=$(git rev-parse --short HEAD)
          CTX=images/hermes
          cd "$CTX"

          cp -f hermes.env.example hermes.env
          : > extra-ca-certs.pem

          IMAGE="${REGISTRY}/hermes-minimal-bootc"
          docker buildx build \
            --platform=linux/amd64 \
            --push \
            --build-arg "OPENSHELL_SUPERVISOR_IMAGE=${REGISTRY}/openshell-supervisor:nightly" \
            -t "${IMAGE}:nightly" \
            -t "${IMAGE}:${DATE}" \
            -t "${IMAGE}:sha-${SHORT}" \
            -f Containerfile.minimal \
            .

  build-hermes-containerdisk:
    needs: [meta, build-hermes-bootc]
    if: |
      always() &&
      !cancelled() &&
      needs.meta.outputs.build_container_disk == 'true' &&
      needs.build-hermes-bootc.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login rootful podman to GHCR
        run: |
          set -euo pipefail
          echo "USER_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "USER_GID=$(id -g)" >> "$GITHUB_ENV"
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io \
            -u "${{ github.actor }}" --password-stdin

      - name: Build qcow2 with bootc-image-builder
        id: bib
        uses: osbuild/bootc-image-builder-action@v0.0.2
        with:
          config-file: .github/bib-qcow2.toml
          image: ${{ env.REGISTRY }}/hermes-sandbox-bootc:nightly
          types: qcow2
          rootfs: ext4
          chown: ${{ env.USER_UID }}:${{ env.USER_GID }}
          additional-args: --use-librepo=True

      - name: Package and push hermes-sandbox-kubevirt
        env:
          DATE: ${{ needs.meta.outputs.date }}
          QCOW2: ${{ steps.bib.outputs.qcow2-output-path }}
        run: |
          set -euo pipefail
          test -n "$QCOW2"
          test -f "$QCOW2"

          # buildx --format '{{.Digest}}' is unreliable across versions; parse text output.
          DIGEST=$(docker buildx imagetools inspect \
            "${REGISTRY}/hermes-sandbox-bootc:nightly" \
            | awk '/^Digest:/ { print $2; exit }')
          test -n "$DIGEST"
          SHORT="${DIGEST#sha256:}"
          SHORT="${SHORT:0:12}"

          PKG=$(mktemp -d)
          mkdir -p "$PKG/disk"
          cp "$QCOW2" "$PKG/disk/fedora.qcow2"
          printf 'FROM scratch\nCOPY disk/fedora.qcow2 /disk/fedora.qcow2\n' > "$PKG/Dockerfile"

          IMAGE="${REGISTRY}/hermes-sandbox-kubevirt"
          docker buildx build \
            --platform=linux/amd64 \
            --push \
            -t "${IMAGE}:nightly" \
            -t "${IMAGE}:${DATE}" \
            -t "${IMAGE}:sha-${SHORT}" \
            "$PKG"

  build-hermes-minimal-containerdisk:
    needs: [meta, build-hermes-minimal-bootc]
    if: |
      always() &&
      !cancelled() &&
      needs.meta.outputs.build_container_disk == 'true' &&
      needs.build-hermes-minimal-bootc.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login rootful podman to GHCR
        run: |
          set -euo pipefail
          echo "USER_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "USER_GID=$(id -g)" >> "$GITHUB_ENV"
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io \
            -u "${{ github.actor }}" --password-stdin

      - name: Build qcow2 with bootc-image-builder
        id: bib
        uses: osbuild/bootc-image-builder-action@v0.0.2
        with:
          config-file: .github/bib-qcow2.toml
          image: ${{ env.REGISTRY }}/hermes-minimal-bootc:nightly
          types: qcow2
          rootfs: ext4
          chown: ${{ env.USER_UID }}:${{ env.USER_GID }}
          additional-args: --use-librepo=True

      - name: Package and push hermes-minimal-kubevirt
        env:
          DATE: ${{ needs.meta.outputs.date }}
          QCOW2: ${{ steps.bib.outputs.qcow2-output-path }}
        run: |
          set -euo pipefail
          test -n "$QCOW2"
          test -f "$QCOW2"

          DIGEST=$(docker buildx imagetools inspect \
            "${REGISTRY}/hermes-minimal-bootc:nightly" \
            | awk '/^Digest:/ { print $2; exit }')
          test -n "$DIGEST"
          SHORT="${DIGEST#sha256:}"
          SHORT="${SHORT:0:12}"

          PKG=$(mktemp -d)
          mkdir -p "$PKG/disk"
          cp "$QCOW2" "$PKG/disk/fedora.qcow2"
          printf 'FROM scratch\nCOPY disk/fedora.qcow2 /disk/fedora.qcow2\n' > "$PKG/Dockerfile"

          IMAGE="${REGISTRY}/hermes-minimal-kubevirt"
          docker buildx build \
            --platform=linux/amd64 \
            --push \
            -t "${IMAGE}:nightly" \
            -t "${IMAGE}:${DATE}" \
            -t "${IMAGE}:sha-${SHORT}" \
            "$PKG"

  # Site Hermes layers live in shanemcd/toolbox (openshell-kubevirt/); CI is
  # centralized here so public bootc + site disk rebuild in one pipeline.
  build-hermes-site:
    needs: [meta, build-hermes-minimal-bootc]
    if: |
      always() &&
      !cancelled() &&
      needs.meta.outputs.build_site_hermes == 'true' &&
      needs.build-hermes-minimal-bootc.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      BOOTC_IMAGE: ghcr.io/${{ github.repository_owner }}/hermes-site-bootc
      DISK_IMAGE: ghcr.io/${{ github.repository_owner }}/hermes-site-kubevirt
      BASE_IMAGE: ghcr.io/${{ github.repository_owner }}/hermes-minimal-bootc:nightly
    steps:
      - name: Checkout toolbox site layers
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/toolbox
          path: toolbox

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push hermes-site-bootc
        working-directory: toolbox/openshell-kubevirt
        env:
          DATE: ${{ needs.meta.outputs.date }}
        run: |
          set -euo pipefail
          docker buildx build \
            --platform=linux/amd64 \
            --push \
            --build-arg "BASE_IMAGE=${BASE_IMAGE}" \
            -t "${BOOTC_IMAGE}:latest" \
            -t "${BOOTC_IMAGE}:${DATE}" \
            -t "${BOOTC_IMAGE}:nightly" \
            -f Containerfile .

      # bib needs ~tens of GB; site job already pulled minimal + layered images.
      - name: Free disk space before bootc-image-builder
        run: |
          set -euo pipefail
          df -h
          docker buildx prune -af || true
          docker system prune -af --volumes || true
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean || true
          df -h

      - name: Login rootful podman to GHCR
        run: |
          set -euo pipefail
          echo "USER_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "USER_GID=$(id -g)" >> "$GITHUB_ENV"
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io \
            -u "${{ github.actor }}" --password-stdin

      - name: Build qcow2 with bootc-image-builder
        id: bib
        uses: osbuild/bootc-image-builder-action@v0.0.2
        with:
          config-file: ${{ github.workspace }}/toolbox/openshell-kubevirt/bib-qcow2.toml
          image: ${{ env.BOOTC_IMAGE }}:nightly
          types: qcow2
          rootfs: ext4
          chown: ${{ env.USER_UID }}:${{ env.USER_GID }}
          additional-args: --use-librepo=True

      - name: Package and push hermes-site-kubevirt
        working-directory: toolbox/openshell-kubevirt
        env:
          DATE: ${{ needs.meta.outputs.date }}
          QCOW2: ${{ steps.bib.outputs.qcow2-output-path }}
        run: |
          set -euo pipefail
          test -n "$QCOW2"
          test -f "$QCOW2"

          PKG=$(mktemp -d)
          mkdir -p "$PKG/disk"
          cp "$QCOW2" "$PKG/disk/fedora.qcow2"
          cp Containerfile.disk "$PKG/Dockerfile"

          docker buildx build \
            --platform=linux/amd64 \
            --push \
            -t "${DISK_IMAGE}:latest" \
            -t "${DISK_IMAGE}:${DATE}" \
            -t "${DISK_IMAGE}:nightly" \
            "$PKG"
